<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Analytics - Attendify</title>

    <link rel="stylesheet" href="./analytics.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>


    <!-- Sidebar -->

    <div class="sidebar">


        <h2> Attendify</h2>


        <a href="dashboard.html">
             Dashboard
        </a>


        <a href="calculator.html">
             Attendance Calculator
        </a>


        <a href="records.html">
             Attendance Records
        </a>


        <a class="active" href="analytics.html">
             Analytics
        </a>


        <a href="profile.html">
             Student Profile
        </a>



        <button onclick="logout()">
             Logout
        </button>


    </div>







    <!-- Main -->


    <div class="main">



        <div class="header">


            <div>

                <h1>
                     Attendance Analytics
                </h1>


                <p>
                    Analyze your attendance performance
                </p>


            </div>



            <button class="theme" onclick="toggleTheme()">

                🌙

            </button>


        </div>









        <!-- Summary Cards -->


        <div class="cards">


            <div class="card">

                <h3>
                    Weekly Attendance
                </h3>

                <h1 class="green">
                    82%
                </h1>

            </div>




            <div class="card">

                <h3>
                    Monthly Attendance
                </h3>

                <h1>
                    78%
                </h1>

            </div>





            <div class="card">

                <h3>
                    Best Subject
                </h3>

                <h1>
                    Java
                </h1>

            </div>





            <div class="card">

                <h3>
                    Need Improvement
                </h3>

                <h1 class="red">
                    Math
                </h1>

            </div>



        </div>








        <!-- Charts -->


        <div class="charts">


            <div class="chart-box">


                <h2>
                     Weekly Attendance
                </h2>


                <canvas id="weeklyChart"></canvas>


            </div>





            <div class="chart-box">


                <h2>
                     Subject Performance
                </h2>


                <canvas id="subjectChart"></canvas>


            </div>



        </div>





    </div>






    <script src="./analytics.js"></script>


</body>

</html>
